name: PHP Syntax Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: pdo, pdo_mysql, pdo_pgsql

    - name: PHP Syntax Checker (Lint)
      run: find . -name "*.php" -print0 | xargs -0 -n1 php -l
